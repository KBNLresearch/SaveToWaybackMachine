# GitHub Pages Configuration
title: SaveToWaybackMachine
description: Scripts and data for archiving KB-managed websites to the Internet Archive's Wayback Machine
baseurl: "/SaveToWaybackMachine"
url: "https://kbnlresearch.github.io"

# Include underscore-prefixed directories (Jekyll ignores _ dirs by default)
include:
  - _spider-artifacts
  - _archiving-artifacts

# Exclude from build
exclude:
  - .idea/
  - .claude/
  - .prompt-page/
  - Schermafbeelding*.png

# Defaults for breadcrumbs
defaults:
  - scope:
      path: ""
    values:
      layout: default
